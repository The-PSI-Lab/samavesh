<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis | Heat Exchanger | S.A.M.A.V.E.S.H.</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="top-bar">
    <a href="{{ url_for('equipment') }}" class="back-link">← Back</a>
    <img src="{{ url_for('static', filename='images/psi-lab-logo.png') }}" alt="PSI Lab" class="nav-logo">
    <span class="top-title">Heat Exchanger Analysis</span>
  </nav>

  <main class="container">
    <form action="{{ url_for('calculate') }}" method="POST" class="analysis-form">
      <input type="hidden" name="equipment" value="heat_exchanger">

      <div class="panel">
        <div class="panel-head"><span class="panel-tag">A</span><h3>Process Specs</h3></div>
        <div class="grid-3">
          <div class="field">
            <label>Heat Duty</label>
            <div class="combo">
              <input type="number" step="any" name="heat_duty" required>
              <select name="heat_duty_unit">
                <option value="kW" selected>kW</option><option value="MW">MW</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Utility Type</label>
            <select name="utility_type">
              <option>Steam</option><option>Cooling Water</option>
              <option>Electricity</option><option>Hot Oil</option>
              <option>Refrigeration</option><option>Natural Gas</option>
            </select>
          </div>
          <div class="field">
            <label>Plant Capacity</label>
            <input type="number" step="any" name="plant_capacity" placeholder="tonnes/day">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-tag">B</span><h3>HX Details</h3></div>
        <div class="grid-3">
          <div class="field">
            <label>HX Type</label>
            <select name="hx_type">
              <option>Shell and Tube</option><option>Double Pipe</option>
              <option>Air Cooler</option><option>Plate HX</option>
            </select>
          </div>
          <div class="field">
            <label>Heat Transfer Area</label>
            <div class="combo">
              <input type="number" step="any" name="area" value="200">
              <select name="area_unit"><option value="m2" selected>m²</option><option value="ft2">ft²</option></select>
            </div>
          </div>
          <div class="field">
            <label>Shell ID</label>
            <div class="combo">
              <input type="number" step="any" name="shell_id" value="0.6">
              <select name="shell_id_unit"><option value="m" selected>m</option><option value="mm">mm</option></select>
            </div>
          </div>
        </div>
        <div class="grid-3">
          <div class="field">
            <label>Tube Length</label>
            <div class="combo">
              <input type="number" step="any" name="tube_length" value="6">
              <select name="tube_length_unit"><option value="m" selected>m</option><option value="mm">mm</option></select>
            </div>
          </div>
          <div class="field">
            <label>No. of Tubes</label>
            <input type="number" step="1" name="num_tubes" value="150">
          </div>
          <div class="field">
            <label>Tube OD</label>
            <div class="combo">
              <input type="number" step="any" name="tube_od" value="19">
              <select name="tube_od_unit"><option value="mm" selected>mm</option><option value="in">in</option></select>
            </div>
          </div>
        </div>
        <div class="grid-3">
          <div class="field">
            <label>Design Pressure</label>
            <div class="combo">
              <input type="number" step="any" name="design_pressure" value="10">
              <select name="pressure_unit"><option value="bar" selected>bar</option><option value="psi">psi</option></select>
            </div>
          </div>
          <div class="field">
            <label>Design Temp</label>
            <div class="combo">
              <input type="number" step="any" name="design_temp" value="150">
              <select name="temp_unit"><option value="degC" selected>°C</option><option value="degF">°F</option></select>
            </div>
          </div>
          <div class="field">
            <label>Shell Material</label>
            <select name="shell_material">
              <option>Carbon Steel</option><option>SS304</option><option>SS316</option>
            </select>
          </div>
        </div>
        <div class="grid-3">
          <div class="field">
            <label>Tube Material</label>
            <select name="tube_material">
              <option>Carbon Steel</option><option>SS304</option><option>SS316</option>
            </select>
          </div>
          <div class="field">
            <label>Bare Module Factor (F<sub>BM</sub>)</label>
            <input type="number" step="any" name="bare_module_factor" value="3.291">
          </div>
          <div class="field">
            <label>Tag ID</label>
            <input type="text" name="tag_id" placeholder="e.g. HX-101">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-tag">$</span><h3>Economics</h3></div>
        <div class="grid-3">
          <div class="field">
            <label>Utility Cost</label>
            <div class="combo">
              <input type="number" step="any" name="utility_cost" value="0.07">
              <select name="utility_cost_unit">
                <option value="$/kWh" selected>$/kWh</option>
                <option value="$/MWh">$/MWh</option>
                <option value="$/GJ">$/GJ</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Discount Rate (%)</label>
            <input type="number" step="any" name="discount_rate" value="10">
          </div>
          <div class="field">
            <label>Plant Life (yr)</label>
            <input type="number" step="1" name="plant_life" value="15">
          </div>
        </div>
        <div class="grid-3">
          <div class="field">
            <label>Operating Hours/yr</label>
            <input type="number" step="any" name="operating_hours" value="8000">
          </div>
          <div class="field">
            <label>Maintenance (% of TCI)</label>
            <input type="number" step="any" name="maintenance_pct" value="5">
          </div>
          <div class="field">
            <label>Contingency (% of CBM)</label>
            <input type="number" step="any" name="contingency_pct" value="18">
          </div>
        </div>
        <div class="grid-3">
          <div class="field">
            <label>Working Capital (% of FCI)</label>
            <input type="number" step="any" name="working_capital_pct" value="15">
          </div>
          <div class="field">
            <label>Currency</label>
            <select name="currency">
              <option value="USD" selected>$ USD</option>
              <option value="INR">₹ INR</option>
              <option value="EUR">€ EUR</option>
              <option value="GBP">£ GBP</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-run">See Results →</button>
    </form>

    <div class="action-row" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <a href="{{ url_for('equipment') }}" class="btn-pdf">Add Another Equipment</a>
      <a href="{{ url_for('net_capex') }}" class="btn-ghost">Proceed to Net CapEx →</a>
    </div>
  </main>

  <footer class="page-footer">
    <img src="{{ url_for('static', filename='images/psi-lab-logo.png') }}" alt="PSI Lab" class="footer-logo">
    <small>&copy; 2026 The PSI Lab, IIT Kharagpur</small>
  </footer>
</body>
</html>
